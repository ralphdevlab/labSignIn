<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Lab Sign-In</title>
</head>
<body>
<h1>Lab Sign-In Form</h1>
<form action="#" th:action="@{/submit}" th:object="${student}" method="post">
    <label>First Name:</label>
    <input type="text" th:field="*{firstName}" required><br>

    <label>Last Name:</label>
    <input type="text" th:field="*{lastName}" required><br>

    <label>Email (@mail.valenciacollege.edu):</label>
    <input type="email" th:field="*{email}" required><br>


    <button type="submit">Sign In</button>
</form>
</body>
</html>
